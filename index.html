<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selector de Kits</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0f1117;--surface:#181c26;--surface2:#1e2333;--border:#2a3045;--accent:#3b82f6;--accent2:#60a5fa;--success:#22c55e;--warning:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header-title{font-size:15px;font-weight:600;letter-spacing:-0.02em}
.header-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.status-pill{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text3);display:flex;align-items:center;gap:5px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background 0.3s}
.status-dot.ready{background:var(--success);box-shadow:0 0 6px var(--success)}
.status-dot.loading{background:var(--warning);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:10px;animation:fadeIn 0.25s ease;max-width:820px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.assistant{align-self:flex-start}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px}
.avatar.bot{background:linear-gradient(135deg,var(--accent),#8b5cf6)}
.avatar.user{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.65;max-width:720px}
.msg.assistant .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px}
.msg.user .bubble{background:var(--accent);color:white;border-top-right-radius:3px}
.bubble h1,.bubble h2,.bubble h3{font-size:14px;font-weight:600;color:var(--accent2);margin:10px 0 4px}
.bubble h1{font-size:15px}
.msg.user .bubble h1,.msg.user .bubble h2,.msg.user .bubble h3{color:white}
.bubble strong{font-weight:600;color:var(--accent2)}
.msg.user .bubble strong{color:white}
.bubble em{color:var(--text2);font-style:italic}
.bubble code{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:3px}
.bubble pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:12px;line-height:1.5}
.bubble table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
.bubble th{background:var(--surface2);padding:7px 10px;text-align:left;border:1px solid var(--border);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2)}
.bubble td{padding:6px 10px;border:1px solid var(--border);font-size:12px;font-family:var(--mono)}
.bubble tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.bubble ul,.bubble ol{padding-left:20px;margin:6px 0}
.bubble li{margin:3px 0;line-height:1.5}
.bubble p{margin:5px 0}
.bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.bubble blockquote{border-left:3px solid var(--accent);padding-left:10px;margin:8px 0;color:var(--text2);font-size:13px}
.result-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:8px 14px;font-family:var(--mono);font-size:13px;color:var(--success);margin:6px 0;width:100%}
.note-badge{display:flex;gap:8px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:8px 12px;margin:6px 0;font-size:13px;color:var(--text2)}
.typing{display:flex;gap:4px;padding:14px 15px;align-items:center}
.typing span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{padding:12px 20px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:8px 8px 8px 14px;transition:border-color 0.2s}
.input-row:focus-within{border-color:var(--accent)}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;resize:none;min-height:22px;max-height:120px}
textarea::placeholder{color:var(--text3)}
.send-btn{width:34px;height:34px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s,transform 0.1s;color:white;font-size:16px}
.send-btn:hover{background:var(--accent2)}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{background:var(--border);cursor:not-allowed;opacity:0.5}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#dc2626;color:white;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:50;max-width:420px;text-align:center}
.toast.show{opacity:1}
.new-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.new-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
  <div class="header-left">
    <div class="logo">🔧</div>
    <div>
      <div class="header-title">Selector de Kits</div>
      <div class="header-sub">PROTO v5.1</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="new-btn" onclick="newSession()">↺ Nueva selección</button>
    <div class="status-pill">
      <div class="status-dot ready" id="statusDot"></div>
      <span id="statusText">Listo</span>
    </div>
  </div>
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Escribe aquí..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>
<script>
let history=[];
let isLoading=false;

function renderMarkdown(text){
  // Escape HTML first
  let html = text
    // Headers
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    // Result badges
    .replace(/✅ \*\*Referencia seleccionada: ([^*\n]+)\*\*/g,'<div class="result-badge">✅ <strong>Referencia seleccionada: $1</strong></div>')
    .replace(/✅ \*\*([^*\n]+)\*\*/g,'<div class="result-badge">✅ $1</div>')
    .replace(/✅ ([^\n]+)/g,'<div class="result-badge">✅ $1</div>')
    // Note badges
    .replace(/📋 \*\*([^*\n]+)\*\*/g,'<div class="note-badge">📋 <strong>$1</strong></div>')
    .replace(/🔧 \*\*([^*\n]+)\*\*/g,'<div class="note-badge">🔧 <strong>$1</strong></div>')
    // Tables
    .replace(/((?:\|.+\|\n?)+)/g, tb => {
      const lines = tb.trim().split('\n').filter(l=>l.includes('|'));
      if(lines.length < 2) return tb;
      let out = '<table>';
      lines.forEach((line,i) => {
        if(line.match(/^\|[\s\-:]+\|/)) return;
        const cells = line.split('|').filter(c=>c.trim()!=='');
        const tag = i===0 ? 'th' : 'td';
        out += '<tr>' + cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      });
      return out + '</table>';
    })
    // Code blocks
    .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    // Inline code
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    // Bold
    .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
    // Italic
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    // HR
    .replace(/^---+$/gm,'<hr>')
    // Blockquote
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    // Lists - bullets
    .replace(/^[\s]*[·•\-\*]\s+(.+)$/gm,'<li>$1</li>')
    // Lists - numbered
    .replace(/^[\s]*\d+\.\s+(.+)$/gm,'<li>$1</li>')
    // Wrap consecutive li
    .replace(/(<li>[\s\S]*?<\/li>)(\n<li>[\s\S]*?<\/li>)*/g, m => '<ul>'+m+'</ul>')
    // Paragraphs
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n(?!<)/g,'<br>');

  return '<p>' + html + '</p>';
}

function addMessage(role, content, isTyping=false){
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar ${role==='assistant'?'bot':'user'}">${role==='assistant'?'🔧':'👤'}</div>
    <div class="bubble">${isTyping?'<div class="typing"><span></span><span></span><span></span></div>':renderMarkdown(content)}</div>`;
  if(isTyping) div.id='typing-indicator';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function removeTyping(){const t=document.getElementById('typing-indicator');if(t)t.remove();}
function setStatus(s,t){document.getElementById('statusDot').className='status-dot '+(s==='ready'?'ready':s==='loading'?'loading':'');document.getElementById('statusText').textContent=t;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000);}

async function callProxy(messages){
  const resp = await fetch('/api/claude-proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({messages})
  });
  const data = await resp.json();
  if(!resp.ok) throw new Error(data.error||'Error de API');
  return data.content[0].text;
}

async function sendMessage(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text||isLoading) return;
  input.value=''; autoResize(input);
  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  addMessage('user',text);
  history.push({role:'user',content:text});
  addMessage('assistant','',true);
  try{
    setStatus('loading','Consultando BD...');
    const response = await callProxy(history);
    removeTyping();
    addMessage('assistant',response);
    history.push({role:'assistant',content:response});
    setStatus('ready','Listo');
  }catch(e){
    removeTyping();
    showToast('Error: '+e.message);
    setStatus('ready','Error');
    history.pop();
  }
  isLoading=false;
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('input').focus();
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

function newSession(){
  history=[];
  document.getElementById('messages').innerHTML='';
  welcome();
}

function welcome(){
  addMessage('assistant',`**Bienvenido al Selector de Kits** 🔧

Soy tu asistente para identificar el kit correcto para tu vehículo. Te haré las preguntas mínimas para llegar a la referencia exacta.

---

**¿Qué tipo de kit necesitas?**

- 🧊 **Kit compresor A/C** (KB...) — aire acondicionado de cabina
- ❄️ **Kit compresor frío industrial** (KC...) — frío de transporte
- ⚡ **Kit alternador** (KA...) — alternador auxiliar
- 💧 **Kit bomba hidráulica** (KH...) — bomba hidráulica
- 🔌 **Kit generador** (KG...) — generador eléctrico
- 🏗️ **Kit chasis** (KF...) — adaptación de chasis`);
}

welcome();
document.getElementById('input').focus();
</script>
</body>
</html>
