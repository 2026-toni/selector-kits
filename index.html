<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selector de Kits</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0f1117;--surface:#181c26;--surface2:#1e2333;--border:#2a3045;
  --accent:#3b82f6;--accent2:#60a5fa;--success:#22c55e;--warning:#f59e0b;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header-title{font-size:15px;font-weight:600;letter-spacing:-0.02em}
.header-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.status-pill{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text3);display:flex;align-items:center;gap:5px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background 0.3s}
.status-dot.ready{background:var(--success);box-shadow:0 0 6px var(--success)}
.status-dot.loading{background:var(--warning);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:10px;animation:fadeIn 0.25s ease;max-width:780px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.assistant{align-self:flex-start}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px}
.avatar.bot{background:linear-gradient(135deg,var(--accent),#8b5cf6)}
.avatar.user{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.bubble{padding:12px 15px;border-radius:12px;font-size:14px;line-height:1.6;max-width:680px}
.msg.assistant .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px}
.msg.user .bubble{background:var(--accent);color:white;border-top-right-radius:3px}
.bubble strong{font-weight:600;color:var(--accent2)}
.msg.user .bubble strong{color:white}
.bubble code{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:3px}
.bubble pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:12px;line-height:1.5}
.bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.bubble th{background:var(--surface2);padding:6px 10px;text-align:left;border:1px solid var(--border);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2)}
.bubble td{padding:6px 10px;border:1px solid var(--border);font-size:12px;font-family:var(--mono)}
.bubble tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.bubble ul,.bubble ol{padding-left:18px;margin:4px 0}
.bubble li{margin:2px 0}
.bubble p{margin:4px 0}
.bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.result-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:6px;padding:6px 12px;font-family:var(--mono);font-size:13px;color:var(--success);margin:4px 0}
.typing{display:flex;gap:4px;padding:14px 15px;align-items:center}
.typing span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{padding:12px 20px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:8px 8px 8px 14px;transition:border-color 0.2s}
.input-row:focus-within{border-color:var(--accent)}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;resize:none;min-height:22px;max-height:120px}
textarea::placeholder{color:var(--text3)}
.send-btn{width:34px;height:34px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s,transform 0.1s;color:white;font-size:16px}
.send-btn:hover{background:var(--accent2)}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{background:var(--border);cursor:not-allowed;opacity:0.5}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;transition:opacity 0.4s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--mono);font-size:13px;color:var(--text2)}
.loading-sub{font-size:11px;color:var(--text3)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#dc2626;color:white;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:50;max-width:400px;text-align:center}
.toast.show{opacity:1}
.new-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all 0.2s}
.new-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div style="text-align:center">
    <div style="font-size:32px;margin-bottom:16px">🔧</div>
    <div class="loading-spinner" style="margin:0 auto 16px"></div>
    <div class="loading-text" id="loadingText">Cargando base de datos...</div>
    <div class="loading-sub" id="loadingPercent">Iniciando</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="header">
  <div class="header-left">
    <div class="logo">🔧</div>
    <div>
      <div class="header-title">Selector de Kits</div>
      <div class="header-sub">PROTO v5.0</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="new-btn" onclick="newSession()">↺ Nueva selección</button>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Iniciando</span>
    </div>
  </div>
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Escribe aquí..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>
<script>
let DB=[];
let history=[];
let isLoading=false;

const SYSTEM_PROMPT=`Eres un asistente experto en selección de kits para vehículos. Tienes acceso a una base de datos de kits en formato JSON que se te proporcionará con cada mensaje como contexto filtrado.

REGLAS OBLIGATORIAS:
- Solo recomiendas códigos que existan en los datos proporcionados.
- No inventas productos, referencias, compatibilidades ni datos técnicos.
- Una sola pregunta por turno.
- Si algo no está en los datos, di que no consta en la base de datos.

FLUJO OBLIGATORIO (sigue este orden exacto):

PASO 1 — TIPO DE KIT (primera pregunta siempre):
Pregunta qué tipo de kit necesita:
- Kit compresor A/C (KB...) — compresor de aire acondicionado de cabina
- Kit compresor frío industrial (KC...) — compresor de frío de transporte
- Kit alternador (KA...) — alternador auxiliar
- Kit bomba hidráulica (KH...) — bomba hidráulica
- Kit generador (KG...) — generador eléctrico
- Kit chasis (KF...) — adaptación de chasis

PASO 2 — ¿VEHÍCULO NUEVO? (antes de marca/modelo):
Pregunta: "¿Es un vehículo nuevo (matriculado recientemente)?"
- Si SÍ: tras identificar el modelo, usa SOLO los kits con year_from_int = model_max_year
- Si NO: continúa con flujo normal

PASO 3 — MARCA: Usa campo brand. Pide la marca si no la conoces.
💡 España/UE: Permiso de circulación campo D.1 Marca

PASO 4 — MODELO: Usa campo model_clean. Muestra 4-8 opciones reales.
💡 España/UE: Permiso campos D.2 Tipo y D.3 Denominación comercial

PASO 5 — MOTOR: Usa engine_clean. Muestra opciones reales.
💡 España/UE: Permiso campo P.5 o P.3 Cilindrada

PASO 6 — AÑO (pregunta exacta): "¿Sabes el año de fabricación o primera matriculación?"
- Filtro: year_from_int <= año_usuario Y (year_to_int es null O year_to_int >= año_usuario)
💡 España/UE: Permiso campo B. Fecha de primera matriculación

PASO 7 — COMPONENTE: Usa nom_opcio_compressor. Agrupa por tipo.

PASO 8 — FLAGS VEHÍCULO (solo si varían): flag_rwd/fwd/awd → tracción | flag_rhd → volante derecha | flag_start_stop → Start&Stop

PASO 9 — FLAGS KIT (orden por poder resolutivo, solo si varían):
1. flag_gearbox_v3: ok=compatible auto, not=NO compatible, vacío=válido ambas → NO preguntar si todos vacíos
2. flag_auto_tensioner → tensor automático vs estándar
3. flag_pfmot_yes/no → opción PFMot/PTO
4. flag_urban_kit → entorno urbano
5. flag_ind_belt → correa independiente
6. flag_n63_pulley_yes/no + flag_n63_full_option → polea N62/N63
7. flag_sanden → compresor SANDEN
8. Resto flags en orden

PASO 10 — A/C (ac_filter): any→NO preguntar | yes vs no → preguntar "¿Tiene A/C de fábrica?"

SELECCIÓN FINAL:
✅ Referencia seleccionada: [CODE]
Motivo: [modelo] · [motor] · [desde year_from_v4] · [componente] · [diferencial]
📋 Notas importantes: (solo si hay noteeng relevante)
🔧 Opción con embrague: (solo si embrague_esp no está vacío)

CASOS ESPECIALES:
- STANDARD BRACKET / COMPRESSOR BRACKET → excluir salvo petición explícita
- year_confidence=doubt → no descartar, informar al usuario
- Sin resultado → decirlo claramente, no inventar`;

async function loadDB(){
  setStatus('loading','Cargando BD...');
  setLoadingText('Buscando base de datos en caché...','');
  try{
    let allData=[];
    const meta=await safeGet('db_meta');
    if(meta){
      const m=JSON.parse(meta.value);
      setLoadingText('Base de datos encontrada',`${m.total} kits · ${m.chunks} fragmentos`);
      for(let i=0;i<m.chunks;i++){
        setLoadingText(`Cargando fragmento ${i+1} de ${m.chunks}...`,`${Math.round((i/m.chunks)*100)}%`);
        const chunk=await safeGet(`db_chunk_${i}`);
        if(!chunk){allData=[];break;}
        allData=allData.concat(JSON.parse(chunk.value));
      }
      if(allData.length===m.total){
        DB=allData;
        setLoadingText('¡Listo!',`${DB.length} kits cargados`);
        setTimeout(finishLoading,600);
        return;
      }
    }
    setLoadingText('Descargando base de datos...','Primera carga — solo una vez');
    const resp=await fetch('./bbdd_kits_v5_clean.json');
    if(!resp.ok) throw new Error('No se encontró bbdd_kits_v5_clean.json');
    const data=await resp.json();
    DB=data;
    const CHUNK=3000;
    const chunks=[];
    for(let i=0;i<data.length;i+=CHUNK) chunks.push(data.slice(i,i+CHUNK));
    for(let i=0;i<chunks.length;i++){
      setLoadingText(`Guardando en caché (${i+1}/${chunks.length})...`,`${Math.round(((i+1)/chunks.length)*100)}%`);
      await safeSet(`db_chunk_${i}`,JSON.stringify(chunks[i]));
    }
    await safeSet('db_meta',JSON.stringify({total:data.length,chunks:chunks.length}));
    setLoadingText('¡Base de datos lista!',`${DB.length} kits cargados`);
    setTimeout(finishLoading,600);
  }catch(e){
    console.error(e);
    setLoadingText('Sin base de datos local','El selector funcionará en modo básico');
    setTimeout(finishLoading,1000);
  }
}

async function safeGet(key){try{return await window.storage.get(key);}catch(e){return null;}}
async function safeSet(key,value){try{return await window.storage.set(key,value);}catch(e){return null;}}

function filterDB(ctx){
  if(!DB||DB.length===0) return [];
  let f=DB.filter(r=>r.kit_type!=='Otro'&&r.brand!=='ACCESSORY');
  const c=ctx.toLowerCase();
  if(c.includes('compresor a/c')||c.includes(' kb')||c.match(/\bkb\b/)) f=f.filter(r=>r.kit_type==='Kit compresor A/C');
  else if(c.includes('frío industrial')||c.includes('frio industrial')||c.match(/\bkc\b/)) f=f.filter(r=>r.kit_type==='Kit compresor frío industrial');
  else if(c.includes('alternador')||c.match(/\bka\b/)) f=f.filter(r=>r.kit_type==='Kit alternador');
  else if(c.includes('bomba')||c.match(/\bkh\b/)) f=f.filter(r=>r.kit_type==='Kit bomba hidráulica');
  else if(c.includes('generador')||c.match(/\bkg\b/)) f=f.filter(r=>r.kit_type==='Kit generador');
  else if(c.includes('chasis')||c.match(/\bkf\b/)) f=f.filter(r=>r.kit_type==='Kit chasis');
  const brands=['RENAULT','FIAT','IVECO','FORD','MERCEDES','VW','OPEL','NISSAN','PEUGEOT','CITROEN','MAN','DAF','VOLVO','TOYOTA','MITSUBISHI'];
  for(const b of brands){if(c.includes(b.toLowerCase())){f=f.filter(r=>r.brand&&r.brand.toUpperCase().includes(b));break;}}
  if(f.length>600){
    const seen=new Set();const deduped=[];
    for(const r of f){if(!seen.has(r.code)){seen.add(r.code);deduped.push(r);}}
    return deduped.slice(0,600);
  }
  return f;
}

async function callClaude(userMessage){
  const ctx=history.map(m=>m.content).join(' ');
  const relevant=filterDB(ctx+' '+userMessage);
  const dataCtx=relevant.length>0
    ?`\n\nDATOS BD (${relevant.length} registros):\n${JSON.stringify(relevant)}`
    :'\n\nBD: No hay datos locales cargados.';
  const messages=[...history,{role:'user',content:userMessage+dataCtx}];
  const resp=await fetch('/api/claude-proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:SYSTEM_PROMPT,messages})
  });
  const data=await resp.json();
  if(!resp.ok) throw new Error(data.error||'Error de API');
  return data.content[0].text;
}

function renderMarkdown(text){
  return text
    .replace(/((\|.+\|\n?)+)/g,tb=>{
      const lines=tb.trim().split('\n').filter(l=>l.includes('|'));
      if(lines.length<2) return tb;
      let out='<table>';
      lines.forEach((line,i)=>{
        if(line.match(/^\|[\s\-:]+\|/)) return;
        const cells=line.split('|').filter(c=>c.trim()!=='');
        const tag=i===0?'th':'td';
        out+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';
      });
      return out+'</table>';
    })
    .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/✅ \*\*([^*]+)\*\*/g,'<div class="result-badge">✅ $1</div>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^[\s]*[·\-]\s+(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n(?!<)/g,'<br>');
}

function addMessage(role,content,isTyping=false){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  div.innerHTML=`<div class="avatar ${role==='assistant'?'bot':'user'}">${role==='assistant'?'🔧':'👤'}</div><div class="bubble">${isTyping?'<div class="typing"><span></span><span></span><span></span></div>':renderMarkdown(content)}</div>`;
  if(isTyping) div.id='typing-indicator';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

function removeTyping(){const t=document.getElementById('typing-indicator');if(t)t.remove();}
function setStatus(s,t){document.getElementById('statusDot').className='status-dot '+(s==='ready'?'ready':s==='loading'?'loading':'');document.getElementById('statusText').textContent=t;}
function setLoadingText(m,s){document.getElementById('loadingText').textContent=m;document.getElementById('loadingPercent').textContent=s;}
function finishLoading(){
  document.getElementById('loadingOverlay').classList.add('hidden');
  setStatus('ready',DB.length>0?`${DB.length} kits`:'Listo');
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('input').focus();
  addMessage('assistant',`¡Bienvenido al **Selector de Kits** 🔧\n\nSoy tu asistente para identificar el kit correcto. Te haré las preguntas mínimas para llegar a la referencia exacta.\n\n${DB.length>0?`Base de datos: **${DB.length} registros**.`:''}\n\n---\n\n**¿Qué tipo de kit necesitas?**\n\n- 🧊 **Kit compresor A/C** (KB...) — aire acondicionado de cabina\n- ❄️ **Kit compresor frío industrial** (KC...) — frío de transporte\n- ⚡ **Kit alternador** (KA...) — alternador auxiliar\n- 💧 **Kit bomba hidráulica** (KH...) — bomba hidráulica\n- 🔌 **Kit generador** (KG...) — generador eléctrico\n- 🏗️ **Kit chasis** (KF...) — adaptación de chasis`);
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000);}

async function sendMessage(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text||isLoading) return;
  input.value='';autoResize(input);
  isLoading=true;document.getElementById('sendBtn').disabled=true;
  addMessage('user',text);
  history.push({role:'user',content:text});
  addMessage('assistant','',true);
  try{
    setStatus('loading','Pensando...');
    const response=await callClaude(text);
    removeTyping();addMessage('assistant',response);
    history.push({role:'assistant',content:response});
    setStatus('ready',DB.length>0?`${DB.length} kits`:'Listo');
  }catch(e){
    removeTyping();showToast('Error: '+e.message);setStatus('ready','Error');history.pop();
  }
  isLoading=false;document.getElementById('sendBtn').disabled=false;document.getElementById('input').focus();
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function newSession(){history=[];document.getElementById('messages').innerHTML='';finishLoading();}

loadDB();
</script>
</body>
</html>
